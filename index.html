<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ash Ketchum's Pokémon Journey — Antigravity World Map</title>
  <meta name="description" content="An interactive, scroll-driven visualization of Ash Ketchum's complete Pokémon journey. Explore every region, companion, and milestone from Pallet Town to World Champion.">
  <meta property="og:title" content="Ash Ketchum's Pokémon Journey — Antigravity World Map">
  <meta property="og:description" content="Scroll through Ash's epic journey from Pallet Town to World Monarch — an interactive cosmic map of every region, friend, and Pokémon.">
  <meta property="og:type" content="website">

  <script>
    window.onerror = function(msg, url, line, col, error) {
      const err = document.createElement('div');
      err.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;z-index:999999;padding:20px;font-family:sans-serif;font-size:14px;';
      err.innerText = msg + ' at ' + line + ':' + col;
      document.body.appendChild(err);
      return false;
    };
  </script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/loader.css">

  <!-- GSAP (core + ScrollTrigger + ScrollToPlugin — free CDN) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollToPlugin.min.js" defer></script>
</head>
<body>

  <!-- ═══ LOADER OVERLAY ═══ -->
  <div id="loader-overlay">
    <div class="loader-bg-glow"></div>
    <div class="loader-shockwave" id="shockwave-1"></div>
    <div class="loader-shockwave" id="shockwave-2" style="animation-delay: 1s"></div>
    <div class="loader-particles-container" id="loader-particles"></div>

    <div id="poke-ball-container">
      <div class="poke-ball">
        <div class="poke-ball-top"></div>
        <div class="poke-ball-band"></div>
        <div class="poke-ball-button">
          <div class="poke-ball-button-inner" id="poke-button-inner"></div>
        </div>
      </div>
    </div>

    <div id="loader-progress-container">
      <div id="loader-progress-text">SYNCING JOURNEY DATA... 0%</div>
      <div id="loader-progress-bar-outer">
        <div id="loader-progress-bar-fill"></div>
      </div>
    </div>
  </div>

  <!-- ═══ FLASH EFFECTS ═══ -->
  <div id="white-flash"></div>
  <div id="red-flash"></div>

  <!-- ═══ FIXED VISUAL CONTAINER ═══ -->
  <div id="visual-container">
    <canvas id="particles-canvas"></canvas>
    
    <svg id="journey-map" xmlns="http://www.w3.org/2000/svg" viewBox="-500 -500 3000 3000" preserveAspectRatio="xMidYMid meet">
      <defs>
        <filter id="node-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
          <feComposite in="blur" in2="SourceGraphic" operator="over" />
        </filter>
        <filter id="champion-glow" x="-80%" y="-80%" width="260%" height="260%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur" />
          <feComposite in="blur" in2="SourceGraphic" operator="over" />
        </filter>
        <filter id="path-blur" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
        </filter>
      </defs>

      <g id="map-container">
        <!-- Z-Index layers in render order -->
        <g id="regions-layer"></g>
        <g id="paths-layer"></g>
        <g id="sub-map-layer"></g>
        <g id="friends-layer"></g>
        <g id="nodes-layer"></g>
        <g id="cities-layer"></g>
        <g id="pois-layer"></g>

        <!-- Ash + Pikachu animated marker -->
        <g id="ash-marker" transform="translate(0, 0)">
          <circle class="ash-marker-glow" r="20" fill="#FFD700" opacity="0.3" />
          <circle class="ash-marker-body" r="10" fill="#FFB300" stroke="#fff" stroke-width="2" />
          <text class="ash-marker-icon" dy="1">⚡</text>
        </g>
      </g>
    </svg>
  </div>

  <!-- ═══ SCROLL RUNWAY (tall invisible div for ScrollTrigger) ═══ -->
  <div id="scroll-runway"></div>

  <!-- ═══ TITLE OVERLAY ═══ -->
  <div id="title-overlay">
    <h1>ASH KETCHUM'S<br>POKÉMON JOURNEY</h1>
    <p class="subtitle">An Antigravity World Map</p>
    <p class="scroll-hint">↓ Scroll to begin the journey ↓</p>
  </div>

  <!-- ═══ JOURNEY PROGRESS BAR ═══ -->
  <div id="progress-container">
    <div id="progress-label">Journey Progress</div>
    <div id="progress-bar-outer">
      <div id="progress-bar-fill"></div>
    </div>
    <div id="progress-percent">0%</div>
  </div>

  <!-- ═══ MINI NAVIGATION DOTS (Left Sidebar) ═══ -->
  <nav id="mini-nav" aria-label="Jump to region"></nav>

  <!-- ═══ MAP UI CONTROLS ═══ -->
  <div id="map-ui">
    <!-- Breadcrumbs -->
    <div id="breadcrumb-nav">
      <button class="crumb active" data-target="world">World</button>
    </div>
    
    <!-- Zoom Controls -->
    <div id="zoom-controls">
      <button id="zoom-in" title="Zoom In">+</button>
      <button id="zoom-out" title="Zoom Out">−</button>
      <button id="zoom-reset" title="Reset View">🌍</button>
    </div>
  </div>

  <!-- ═══ OVERLAY BACKDROP ═══ -->
  <div id="overlay-backdrop"></div>

  <!-- ═══ REGION DETAIL PANEL ═══ -->
  <aside id="region-panel">
    <button class="panel-close" aria-label="Close panel">✕</button>
    <div id="panel-content"></div>
  </aside>

  <!-- ═══ PATH INFO CARD (Bottom Sheet) ═══ -->
  <div id="path-card">
    <div class="card-handle"></div>
    <button class="card-close" aria-label="Close card">✕</button>
    <div id="path-card-content"></div>
  </div>

  <!-- ═══ FRIEND TOOLTIP ═══ -->
  <div id="friend-tooltip">
    <div id="friend-tooltip-content"></div>
  </div>

  <!-- ═══ SCRIPTS (ES Modules) ═══ -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
